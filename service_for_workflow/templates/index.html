<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能对话工作流系统</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(140deg, #eef2ff 0%, #f7f4ff 100%);
            color: #1f2937;
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            max-width: 1520px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 20px 60px rgba(67, 56, 202, 0.16);
        }
        .header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: #fff;
            padding: 20px 24px;
        }
        .header h1 { font-size: 24px; margin-bottom: 6px; }
        .header p { opacity: .92; }

        .main { display: grid; grid-template-columns: 2.35fr 1fr; min-height: 760px; }
        .chat-panel { display: flex; flex-direction: column; border-right: 1px solid #e5e7eb; min-width: 0; }
        .chat-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-bottom: 1px solid #edf0f7;
            background: #fafbff;
            font-size: 13px;
        }
        .chat-toolbar .hint { color: #4b5563; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .welcome {
            margin: auto;
            text-align: center;
            color: #64748b;
        }
        .welcome .icon { font-size: 56px; margin-bottom: 10px; }

        .message { display: flex; flex-direction: column; gap: 5px; }
        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }
        .bubble {
            max-width: min(92%, 960px);
            padding: 12px 16px;
            border-radius: 14px;
            white-space: pre-wrap;
            line-height: 1.68;
            overflow-wrap: anywhere;
            box-shadow: 0 2px 10px rgba(30, 41, 59, 0.08);
        }
        .user .bubble {
            color: #fff;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-bottom-right-radius: 5px;
        }
        .assistant .bubble {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-bottom-left-radius: 5px;
        }
        .bubble p { margin: 0 0 8px; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble ul, .bubble ol { margin: 6px 0 8px 22px; }
        .bubble li { margin: 2px 0; }
        .bubble pre {
            margin: 8px 0;
            padding: 10px;
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.55;
        }
        .bubble code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background: #eef2ff;
            color: #312e81;
            border-radius: 4px;
            padding: 1px 4px;
            font-size: .92em;
        }
        .bubble pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }
        .bubble a { color: #4338ca; text-decoration: underline; }
        .meta { font-size: 11px; color: #6b7280; }

        .processing-card {
            align-self: flex-start;
            width: min(92%, 960px);
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 2px 10px rgba(30, 41, 59, 0.08);
        }
        .processing-title { font-weight: 600; color: #4338ca; margin-bottom: 8px; }
        .bar { width: 100%; height: 6px; background: #edf2ff; border-radius: 99px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4f46e5, #7c3aed); transition: width .3s; }
        .processing-sub { margin-top: 8px; font-size: 12px; color: #6b7280; }

        .input-area {
            position: sticky;
            bottom: 0;
            background: #fff;
            border-top: 1px solid #e5e7eb;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-row { display: flex; gap: 10px; }
        #messageInput {
            flex: 1;
            min-height: 44px;
            max-height: 180px;
            resize: vertical;
            border: 1px solid #c7d2fe;
            border-radius: 10px;
            padding: 10px 12px;
            font: inherit;
            outline: none;
        }
        #messageInput:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15); }
        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { color: #fff; background: linear-gradient(135deg, #4f46e5, #7c3aed); }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn-lite { background: #eef2ff; color: #3730a3; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

        .side {
            padding: 16px;
            background: #fcfdff;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px;
        }
        .card h3 { color: #4338ca; font-size: 15px; margin-bottom: 8px; }
        .kv { display: flex; justify-content: space-between; gap: 8px; font-size: 13px; margin: 5px 0; }
        .kv .k { color: #64748b; }
        .kv .v { color: #111827; max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .badge { font-size: 12px; color: #fff; padding: 3px 8px; border-radius: 999px; }
        .ready { background: #059669; }
        .processing { background: #2563eb; }
        .waiting { background: #d97706; }
        .error { background: #dc2626; }

        .timeline { display: flex; flex-direction: column; gap: 8px; max-height: 160px; overflow: auto; }
        .timeline-item {
            font-size: 12px;
            border-left: 3px solid #c7d2fe;
            padding: 5px 8px;
            background: #f8faff;
            border-radius: 6px;
            color: #334155;
        }

        .node-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow: auto; }
        .node {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px;
            font-size: 12px;
            background: #fff;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 8px;
            align-items: center;
        }
        .status { font-size: 11px; padding: 2px 6px; border-radius: 6px; color: #fff; }
        .pending { background: #9ca3af; }
        .success { background: #16a34a; }
        .interrupted { background: #ea580c; }
        .fail { background: #dc2626; }

        @media (max-width: 1100px) {
            .main { grid-template-columns: 1fr; }
            .chat-panel { border-right: 0; border-bottom: 1px solid #e5e7eb; }
            .bubble, .processing-card { max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>智能对话工作流系统</h1>
        <p>面向数据分析 / 比较 / 离群点 / 控制变量分析的多轮工作流对话</p>
    </div>

    <div class="main">
        <section class="chat-panel">
            <div class="chat-toolbar">
                <div class="hint">提示：中断后补充信息会自动恢复原 run_id，不会新建流程。</div>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="welcome">
                    <div class="icon">💬</div>
                    <p>开始输入你的分析问题，例如：比较近30天各地区销量并找离群点。</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-row">
                    <textarea id="messageInput" placeholder="请输入你的问题或补充说明..."></textarea>
                    <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
                <div class="btn-row">
                    <button class="btn btn-lite" onclick="clearChat()">清空对话</button>
                    <button class="btn btn-lite" onclick="newSession()">新会话</button>
                    <button class="btn btn-lite" onclick="refreshStatus()">刷新状态</button>
                </div>
            </div>
        </section>

        <aside class="side">
            <div class="card">
                <h3>会话状态</h3>
                <div class="kv"><span class="k">Session</span><span class="v" id="sessionId">-</span></div>
                <div class="kv"><span class="k">消息数</span><span class="v" id="messageCount">0</span></div>
                <div class="kv"><span class="k">状态</span><span class="v"><span class="badge ready" id="sessionStatus">Ready</span></span></div>
            </div>

            <div class="card">
                <h3>工作流</h3>
                <div class="kv"><span class="k">RunID</span><span class="v" id="runId">Not Started</span></div>
                <div class="kv"><span class="k">状态</span><span class="v" id="workflowStatus">Not Started</span></div>
                <div class="kv"><span class="k">进度</span><span class="v" id="workflowProgressPercent">0%</span></div>
                <div class="bar"><div class="bar-fill" id="workflowProgressFill"></div></div>
            </div>

            <div class="card" id="progressDeltaCard" style="display:none;">
                <h3>进度变更（基于连续状态对比）</h3>
                <div class="timeline" id="progressTimeline"></div>
            </div>

            <div class="card" id="nodeDetailsCard" style="display:none;">
                <h3>节点明细</h3>
                <div class="node-list" id="nodeList"></div>
            </div>
        </aside>
    </div>
</div>

<script>
let currentSessionId = null;
let currentRunId = null;
let pollingInterval = null;
let autoRefreshInterval = null;
let autoRefreshEnabled = true;
let isProcessing = false;
let lastMessageCount = 0;
let workflowState = "not_started";
const INITIAL_CONVERSATION_SAMPLE = `请基于以下业务背景给我一份分析方案：

1) 分析目标（请改成你的目标）：【例如：找出最近30天华东地区销量下滑最明显的产品】
2) 关注指标（请改成你的指标）：【例如：销量、客单价、退货率】
3) 对比维度（请改成你的维度）：【例如：地区、渠道、新老客】
4) 时间范围（请改成你的时间范围）：【例如：2024-01-01 到 2024-01-30】
5) 输出要求（请改成你的输出形式）：【例如：先给结论，再给关键原因和后续动作建议】`;

window.onload = function () {
    initSession();
    const input = document.getElementById("messageInput");
    input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    startAutoRefresh();
};

function startAutoRefresh() {
    if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(() => {
        if (!autoRefreshEnabled || isProcessing || workflowState === "processing") return;
        refreshStatus();
    }, 3000);
}

function applyInitialSample(force = false) {
    const input = document.getElementById("messageInput");
    if (!input) return;
    if (!force && input.value.trim().length > 0) return;
    input.value = INITIAL_CONVERSATION_SAMPLE;
}

async function initSession() {
    try {
        const res = await fetch("/api/session");
        const data = await res.json();
        if (data.success) {
            currentSessionId = data.session_id;
            updateSessionInfo(data.session_id);
            await loadMessages();
        }
    } catch (e) {
        console.error("Init session failed:", e);
    }
}

async function loadMessages() {
    try {
        const res = await fetch("/api/messages");
        const data = await res.json();
        if (data.success) {
            const messages = data.messages || [];
            displayMessages(messages);
            updateMessageCount(messages.length);
        }
    } catch (e) {
        console.error("Load messages failed:", e);
    }
}

async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (!text || isProcessing) return;

    input.value = "";
    autoRefreshEnabled = true;
    addMessageToUI("user", text);
    setProcessingState(true);

    try {
        const res = await fetch("/api/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        });
        const data = await res.json();

        if (!data.success) {
            setProcessingState(false);
            addMessageToUI("assistant", "⚠️ " + (data.error || "发送失败"));
            return;
        }

        currentRunId = data.run_id;
        updateRunId(data.run_id);
        updateWorkflowStatus("processing", "Processing...");
        startWorkflowPolling(data.run_id);
    } catch (e) {
        console.error("Send message failed:", e);
        setProcessingState(false);
        addMessageToUI("assistant", "网络异常，请稍后重试");
    }
}

function startWorkflowPolling(runId) {
    if (pollingInterval) clearInterval(pollingInterval);
    addProcessingMessage();
    pollWorkflowStatus(runId);
    pollingInterval = setInterval(() => pollWorkflowStatus(runId), 1800);
}

async function pollWorkflowStatus(runId) {
    try {
        const res = await fetch(`/api/workflow/${runId}/status`);
        const data = await res.json();
        if (!data || !data.success) return;

        if (data.status === "processing") {
            updateProcessingUI(data);
            updateWorkflowProgress(data);
            updateNodeDetails(data);
            return;
        }

        // 终态或中断时统一走 refresh，避免前端重复插入消息
        if (pollingInterval) {
            clearInterval(pollingInterval);
            pollingInterval = null;
        }

        removeProcessingMessage();
        setProcessingState(false);

        if (data.status === "interrupted") {
            updateWorkflowStatus("waiting", "Interrupted");
        } else if (data.status === "success") {
            updateWorkflowStatus("ready", "Completed");
            updateWorkflowProgress(data);
            autoRefreshEnabled = false;
            hideNodeDetails();
        } else if (data.status === "fail") {
            updateWorkflowStatus("fail", "Failed");
            hideNodeDetails();
        }

        await refreshStatus({ expectedStatus: data.status, fallbackMessage: data.message || data.display_output || "" });
    } catch (e) {
        console.error("Poll workflow status failed:", e);
    }
}

function updateProcessingUI(data) {
    const msg = document.getElementById("currentProcessingMessage");
    if (!msg || !data.progress_info) return;

    const info = data.progress_info;
    document.getElementById("processingCurrentStep").textContent = info.current_node || "processing";
    document.getElementById("processingProgressText").textContent =
        `已观测进度 ${info.percentage}% · 变更 ${info.status_changes_count || 0} 次`;
    document.querySelector("#processingProgressBar .bar-fill").style.width = `${info.percentage || 0}%`;
}

function updateWorkflowProgress(data) {
    if (data.status === "success") {
        document.getElementById("workflowProgressPercent").textContent = "100%";
        document.getElementById("workflowProgressFill").style.width = "100%";
        return;
    }
    if (!data.progress_info) return;
    const info = data.progress_info;
    document.getElementById("workflowProgressPercent").textContent = `${info.percentage || 0}%`;
    document.getElementById("workflowProgressFill").style.width = `${info.percentage || 0}%`;

    const card = document.getElementById("progressDeltaCard");
    const timeline = document.getElementById("progressTimeline");

    const changes = info.status_changes || [];
    if (changes.length > 0 || info.new_nodes_count > 0) {
        card.style.display = "block";
    }

    if (info.new_nodes_count > 0) {
        prependTimeline(`发现 ${info.new_nodes_count} 个新节点`);
    }

    changes.forEach(c => {
        prependTimeline(`节点 ${c.nodeType} 状态 ${c.from} → ${c.to}`);
    });

    function prependTimeline(text) {
        const item = document.createElement("div");
        item.className = "timeline-item";
        item.textContent = text;
        timeline.prepend(item);
        while (timeline.children.length > 12) timeline.removeChild(timeline.lastChild);
    }
}

function updateNodeDetails(data) {
    const card = document.getElementById("nodeDetailsCard");
    const list = document.getElementById("nodeList");
    if (!data.nodes) return;

    card.style.display = "block";
    list.innerHTML = "";

    const steps = data.steps && data.steps.length ? data.steps : Object.keys(data.nodes);
    steps.forEach(nodeId => {
        const n = data.nodes[nodeId] || {};
        const status = n.status || "pending";
        const node = document.createElement("div");
        node.className = "node";
        const shortId = nodeId.length > 14 ? `${nodeId.slice(0, 14)}...` : nodeId;
        node.innerHTML =
            `<span class="status ${status}">${status}</span>` +
            `<span>[${n.nodeType || "unknown"}] ${shortId}</span>` +
            `<span>${n.costMs || 0}ms</span>`;
        list.appendChild(node);
    });
}

function hideNodeDetails() {
    document.getElementById("nodeDetailsCard").style.display = "none";
}

function addProcessingMessage() {
    if (document.getElementById("currentProcessingMessage")) return;
    const chat = document.getElementById("chatMessages");
    const welcome = chat.querySelector(".welcome");
    if (welcome) welcome.remove();

    const box = document.createElement("div");
    box.className = "processing-card";
    box.id = "currentProcessingMessage";
    box.innerHTML =
        `<div class="processing-title" id="processingCurrentStep">正在处理...</div>` +
        `<div class="bar" id="processingProgressBar"><div class="bar-fill"></div></div>` +
        `<div class="processing-sub" id="processingProgressText">等待状态回传...</div>`;

    chat.appendChild(box);
    chat.scrollTop = chat.scrollHeight;
}

function removeProcessingMessage() {
    const p = document.getElementById("currentProcessingMessage");
    if (p) p.remove();
}

function setProcessingState(processing) {
    isProcessing = processing;
    const btn = document.getElementById("sendBtn");
    const input = document.getElementById("messageInput");
    btn.disabled = processing;
    btn.textContent = processing ? "处理中..." : "发送";
    if (!processing) input.focus();
}

async function refreshStatus(options = {}) {
    try {
        const res = await fetch("/api/refresh", { method: "POST" });
        const data = await res.json();
        if (!data.success) return;

        const messages = data.messages || [];
        const previousCount = lastMessageCount;
        displayMessages(messages);
        updateMessageCount(messages.length);
        workflowState = data.workflow_status || workflowState;
        syncSessionAndWorkflowStatus(data);
        updateRunId(data.current_run_id || "Not Started");

        if (options.expectedStatus && options.fallbackMessage && messages.length <= previousCount) {
            addMessageToUI("assistant", options.fallbackMessage);
            const refreshed = [...messages, { role: "assistant", content: options.fallbackMessage }];
            updateMessageCount(refreshed.length);
            lastMessageCount = refreshed.length;
            return;
        }
    } catch (e) {
        console.error("Refresh status failed:", e);
    }
}

async function clearChat() {
    if (!confirm("确认清空对话？")) return;
    if (pollingInterval) {
        clearInterval(pollingInterval);
        pollingInterval = null;
    }
    setProcessingState(false);

    try {
        const res = await fetch("/api/clear", { method: "POST" });
        const data = await res.json();
        if (!data.success) return;

        currentSessionId = data.session_id;
        document.getElementById("chatMessages").innerHTML = '<div class="welcome"><div class="icon">💬</div><p>会话已重置。</p></div>';
        updateSessionInfo(data.session_id);
        updateMessageCount(0);
        updateRunId("Not Started");
        updateWorkflowStatus("ready", "Not Started");
        document.getElementById("workflowProgressPercent").textContent = "0%";
        document.getElementById("workflowProgressFill").style.width = "0%";
        document.getElementById("progressTimeline").innerHTML = "";
        document.getElementById("progressDeltaCard").style.display = "none";
        hideNodeDetails();
        applyInitialSample(true);
    } catch (e) {
        console.error("Clear chat failed:", e);
    }
}

async function newSession() {
    try {
        const res = await fetch("/api/session", { method: "POST" });
        const data = await res.json();
        if (!data.success) return;

        currentSessionId = data.session_id;
        updateSessionInfo(data.session_id);
        document.getElementById("chatMessages").innerHTML = "";
        addMessageToUI("assistant", "你好，我可以帮你做数据比较、离群点识别和控制变量分析。请告诉我你的分析目标。");
        updateMessageCount(1);
        applyInitialSample(true);
    } catch (e) {
        console.error("Create session failed:", e);
    }
}

function displayMessages(messages) {
    const chat = document.getElementById("chatMessages");
    const stickToBottom = isNearBottom(chat);
    const previousDistanceToBottom = chat.scrollHeight - chat.scrollTop;
    chat.innerHTML = "";
    if (!messages || messages.length === 0) {
        chat.innerHTML = '<div class="welcome"><div class="icon">💬</div><p>开始输入你的分析问题。</p></div>';
        applyInitialSample();
        return;
    }
    messages.forEach(m => addMessageToUI(m.role, m.content, m.timestamp, { autoScroll: false }));

    if (stickToBottom) {
        chat.scrollTop = chat.scrollHeight;
        return;
    }

    chat.scrollTop = Math.max(0, chat.scrollHeight - previousDistanceToBottom);
}

function isNearBottom(container, threshold = 100) {
    return container.scrollHeight - container.scrollTop - container.clientHeight <= threshold;
}

function addMessageToUI(role, content, timestamp, options = {}) {
    const autoScroll = options.autoScroll !== false;
    const chat = document.getElementById("chatMessages");
    const welcome = chat.querySelector(".welcome");
    if (welcome) welcome.remove();

    const msg = document.createElement("div");
    msg.className = `message ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = renderMessageContent(content, role);

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = timestamp ? new Date(timestamp).toLocaleString() : new Date().toLocaleString();

    msg.appendChild(bubble);
    msg.appendChild(meta);
    chat.appendChild(msg);
    if (autoScroll) {
        chat.scrollTop = chat.scrollHeight;
    }
}

function syncSessionAndWorkflowStatus(data) {
    const workflow = data.workflow_status || "not_started";
    if (workflow === "processing") {
        updateWorkflowStatus("processing", "Processing...");
        updateSessionStatus(false, "Processing");
        return;
    }
    if (workflow === "success") {
        updateWorkflowStatus("ready", "Completed");
        updateSessionStatus(false, "Ready");
        document.getElementById("workflowProgressPercent").textContent = "100%";
        document.getElementById("workflowProgressFill").style.width = "100%";
        return;
    }
    if (workflow === "interrupted") {
        updateWorkflowStatus("waiting", "Interrupted");
        updateSessionStatus(true, "Waiting Input");
        return;
    }
    if (workflow === "fail") {
        updateWorkflowStatus("fail", "Failed");
        updateSessionStatus(false, "Failed");
        return;
    }
    updateWorkflowStatus("ready", "Not Started");
    updateSessionStatus(Boolean(data.waiting_for_input));
}

function updateSessionInfo(sessionId) {
    document.getElementById("sessionId").textContent = sessionId;
}

function updateMessageCount(count) {
    lastMessageCount = count;
    document.getElementById("messageCount").textContent = String(count);
}

function updateSessionStatus(waiting, customText = "") {
    const e = document.getElementById("sessionStatus");
    if (customText === "Processing") {
        e.textContent = customText;
        e.className = "badge processing";
        return;
    }
    if (customText === "Failed") {
        e.textContent = customText;
        e.className = "badge error";
        return;
    }
    e.textContent = customText || (waiting ? "Waiting Input" : "Ready");
    e.className = `badge ${waiting ? "waiting" : "ready"}`;
}

function updateRunId(runId) {
    currentRunId = runId;
    document.getElementById("runId").textContent = runId || "Not Started";
}

function updateWorkflowStatus(status, text) {
    workflowState = status;
    document.getElementById("workflowStatus").textContent = text;
    const s = document.getElementById("sessionStatus");
    if (status === "processing") s.className = "badge processing";
    else if (status === "waiting") s.className = "badge waiting";
    else if (status === "fail") s.className = "badge error";
    else s.className = "badge ready";
}


function renderMessageContent(content, role) {
    const raw = (content || "").trimEnd();
    if (!raw) return "";
    if (role === "user") {
        return escapeHtml(raw).replace(/\n/g, "<br>");
    }
    return renderMarkdown(raw);
}

function renderMarkdown(text) {
    const lines = text.split("\n");
    const htmlParts = [];
    let inCodeBlock = false;
    let codeBuffer = [];
    let inList = false;

    const flushCodeBlock = () => {
        if (!codeBuffer.length) return;
        htmlParts.push(`<pre><code>${escapeHtml(codeBuffer.join("\n"))}</code></pre>`);
        codeBuffer = [];
    };

    const closeList = () => {
        if (!inList) return;
        htmlParts.push("</ul>");
        inList = false;
    };

    for (const line of lines) {
        const fence = line.match(/^```/);
        if (fence) {
            if (inCodeBlock) {
                flushCodeBlock();
                inCodeBlock = false;
            } else {
                closeList();
                inCodeBlock = true;
            }
            continue;
        }

        if (inCodeBlock) {
            codeBuffer.push(line);
            continue;
        }

        const trimmed = line.trim();
        if (!trimmed) {
            closeList();
            continue;
        }

        const listMatch = line.match(/^\s*[-*]\s+(.+)$/);
        if (listMatch) {
            if (!inList) {
                htmlParts.push("<ul>");
                inList = true;
            }
            htmlParts.push(`<li>${renderInlineMarkdown(listMatch[1])}</li>`);
            continue;
        }

        closeList();

        const heading = line.match(/^\s{0,3}(#{1,6})\s+(.+)$/);
        if (heading) {
            const level = heading[1].length;
            htmlParts.push(`<h${level}>${renderInlineMarkdown(heading[2])}</h${level}>`);
            continue;
        }

        htmlParts.push(`<p>${renderInlineMarkdown(line)}</p>`);
    }

    if (inCodeBlock) flushCodeBlock();
    closeList();

    return htmlParts.join("") || escapeHtml(text).replace(/\n/g, "<br>");
}

function renderInlineMarkdown(text) {
    let rendered = escapeHtml(text || "");

    rendered = rendered.replace(/`([^`]+)`/g, "<code>$1</code>");
    rendered = rendered.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    rendered = rendered.replace(/\*([^*]+)\*/g, "<em>$1</em>");
    rendered = rendered.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    rendered = rendered.replace(/(^|\s)(https?:\/\/[\w\-._~:/?#[\]@!$&()*+,;=%]+)/g, (m, prefix, url) => {
        if (m.includes('href=')) return m;
        return `${prefix}<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    });

    return rendered;
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text || "";
    return div.innerHTML;
}
